services:
  forge-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forge-demo
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
